startCommand:
  type: "http"
  configSchema:
    type: "object"
    properties:
      rootsApiKey:
        type: "string"
        title: "Roots API Key"
        description: "Required for Pro-tier features (Margin of Safety calculations, premium safety synthesis, formulation risk tool). Get yours at https://rootsbybenda.com/account/api-key after subscribing at https://rootsbybenda.com/pricing. Free tier connects without a key and receives public regulatory data only."
        x-from: "header"
        x-to:
          header: "Authorization"
          prefix: "Bearer "
    additionalProperties: false
  exampleConfig:
    rootsApiKey: "mcp_xxxxxxxxxx_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  deploymentUrl: "https://roots-mcp-server.rootsbybenda.workers.dev"
